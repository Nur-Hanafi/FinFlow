<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinFlow — Masuk</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f5f6f8; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; padding: 2.5rem; border-radius: 1.25rem; box-shadow: 0 4px 20px rgba(0,0,0,.08); max-width: 400px; width: 100%; text-align: center; }
    .brand-title { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: #2563eb; margin-bottom: 0.5rem; }
    .brand-tagline { font-size: 0.85rem; color: #8a94a6; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-title">FinFlow</div>
    <div class="brand-tagline">Catatan Keuangan Pribadi</div>
    <h5 class="mb-3 fw-bold">Selamat Datang</h5>
    <p class="text-muted small mb-4">Masuk menggunakan akun Google Anda. Semua data disimpan secara privat di Google Drive Anda sendiri.</p>
    <div class="d-flex justify-content-center">
      <div id="g_id_onload" data-client_id="MASUKKAN_CLIENT_ID_DARI_LANGKAH_1" data-callback="handleLoginSuccess" data-auto_prompt="false"></div>
      <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-size="large" data-text="signin_with"></div>
    </div>
  </div>
  <script>
    let tokenClient;
    window.onload = function () {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: '774411440410-0ff9vjla273gc8dl89skisfju2p5cusr.apps.googleusercontent.com', // COPAST CLIENT ID KAMU DI SINI JUGA
        scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
        callback: (tokenResponse) => {
          if (tokenResponse && tokenResponse.access_token) {
            localStorage.setItem("finflow_access_token", tokenResponse.access_token);
            window.location.href = "dashboard.html";
          }
        }
      });
    };
    function handleLoginSuccess(response) { tokenClient.requestAccessToken(); }
  </script>
</body>
</html>
